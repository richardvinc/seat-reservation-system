map $http_x_user_id $throttle_key {
    default $http_x_user_id;
    "" $binary_remote_addr;
}

limit_req_zone $throttle_key zone=api_per_user:10m rate=5r/s;
limit_conn_zone $throttle_key zone=api_conn_per_user:10m;

upstream web {
    server web:3000;
}

upstream api {
    server api:3100;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 20M;

    location /api/ {
        limit_req zone=api_per_user burst=10 nodelay;
        limit_conn api_conn_per_user 20;
        limit_req_status 429;
        limit_conn_status 429;

        proxy_pass http://api/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User-Id $http_x_user_id;
    }

    location / {
        proxy_pass http://web;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for Next.js hot reload/websocket-like behavior if used
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
